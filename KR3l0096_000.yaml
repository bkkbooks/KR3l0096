body:
  text: 提要漢武故事小説家𩔖二異聞之屬臣等謹案漢武故事一卷舊本題漢班固撰然史不云固有此書隋志著録傳記𩔖中亦不云固作晁公武讀書志引張柬之洞冥記跋謂出於王儉唐初去齊梁未逺當有所考也所言亦多與史記漢書相出入而雜以妖妄之語然如藝文𩔖聚三輔黄圖太平御覽諸書所引甲帳珠簾王母青雀茂陵玉椀諸事稱出漢武故事者乃皆無之又李善注文選西征賦引漢武故事二條其一為柏谷亭事此本亦無之其一為衞子夫事此本雖有之而文反畧於善注考隋志載此書二卷諸家著録並同錢曽讀書敏求記亦尚作二卷稱所藏凡二本一是錫山秦汝操繡石書堂本一是陳文燭晦伯家本又與秦本互異今兩存之云云兩本今皆未見此本為明吳琯古今逸史所刻併為一卷僅寥寥七八頁葢已經刋削又非兩家之本以其六朝舊帙姑存備古書之一種云爾漢武帝内傳小説家𩔖二異聞之屬臣等謹案漢武帝内傳一卷舊本題漢班固撰隋志著録二卷不著撰人宋志亦注曰不知作者此本題曰班固不知何據殆後人因漢武故事偽題班固遂併此書歸之歟漢書東方朔傳賛稱好事者取其言怪語附著之朔此書乃載朔乗龍上昇與傳賛自相矛盾其不出於固灼然無疑其文排偶華麗與王嘉拾遺記陶宏景真誥體格相同考徐陵玉臺新咏序有靈飛六甲髙擅玉函之句實用此傳六甲靈飛十二事封以白玉函語則其偽在齊梁以前又考郭璞㳺仙詩有漢武非仙才句與傳中王母所云殆恐非仙才語相合葛洪神仙傳所載孔元方告馮遇語與傳中稱受之者四十年傳一人無其人八十年可頓授二人非其人謂之泄天道得其人不傳是謂蔽天寳云云相合張華博物志載漢武帝好道西王母七月七日漏七刻乗紫雲東來云云與此傳亦合今本博物志雖真偽相㕘不足為證而李善注文選洛神賦已引博物志此語足信為張華之舊文其殆魏晉間文士所為乎陸徳明莊子釋文注大宗師篇西王母亦引漢武内傳云西王母與上元夫人降帝美容貌神仙人也事與今本所載同而文勺逈異或徳明櫽括其詞歟錢曽讀書敏求記曰漢武内傳一卷孱守居士空居閣校本案孱守居士常熟馮舒之别號也廣記刪去元靈二曲及十二事篇目又脱朱鳥窻一段對過始知此本為完書案李商𨼆詩曰玉桃偷得憐方朔金屋修成貯阿嬌又曰如何漢殿穿針夜又向窻前覷阿環皆用朱鳥窻事知原本當有此一段李善注文選郭璞㳺仙詩引漢武内傳西王母侍女歌曰遂乗萬龍輴馳騁眄九野二句正元豐曲中語知古本當有此二曲錢曽所云良是今檢此本亦無元靈二曲及朱鳥窻一段而有十二事之篇目與曽所説又不同又玉海引中興書目曰漢武帝内傳二卷載西王母事後有淮南王公孫卿稷邱君八事乃唐終南元都道士㳺岩所附今亦無此八事盖明人刪竄之本非完書矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
